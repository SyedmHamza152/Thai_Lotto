<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Forgot Password — Lottery</title>
<link rel="stylesheet" href="css/styles.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');

  :root {
    --bg: #0f0f14;
    --surface: #17171f;
    --surface2: #1e1e2a;
    --surface3: #242433;
    --border: #2a2a3a;
    --primary: #a855f7;
    --primary-glow: rgba(168,85,247,0.25);
    --accent: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #f1f0ff;
    --muted: #7b7a95;
    --muted2: #4a4a65;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg) !important;
    color: var(--text) !important;
    margin: 0;
    min-height: 100vh;
  }

  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
  }

  .auth-card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 8px;
  }

  .muted { color: var(--muted); }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
  .input:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff;
    box-shadow: 0 4px 14px rgba(168,85,247,0.3);
    transition: all 0.18s;
  }

  .btn:hover { box-shadow: 0 6px 18px rgba(168,85,247,0.45); transform: translateY(-1px); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn.full { width: 100%; }

  .error {
    display: none;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    margin-bottom: 16px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
  }

  .error.success {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: #6ee7b7;
  }

  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .hidden { display: none; }
</style>
</head>
<body>
<div class="center">
  <form id="form" class="auth-card card">
    <h2>Reset Password</h2>
    <p class="muted">Verify your identity to reset your password</p>
    <div id="msg" class="error"></div>
    
    <div id="step1">
      <label>Email</label>
      <input class="input" name="email" type="email" required placeholder="your@email.com"/>
      <div style="height:10px"></div>
      <label>Username</label>
      <input class="input" name="username" required placeholder="Your username"/>
      <div style="height:10px"></div>
      <button class="btn full" type="button" id="validateBtn">Continue</button>
    </div>

    <div id="step2" class="hidden">
      <p class="muted" style="margin-bottom:12px">Security Question: <strong id="securityQuestion"></strong></p>
      <label>Security Answer</label>
      <input class="input" name="security_answer" required placeholder="Your answer"/>
      <div style="height:10px"></div>
      <button class="btn full" type="button" id="verifyAnswerBtn">Verify Answer</button>
    </div>

    <div id="step3" class="hidden">
      <label>New Password (min 6)</label>
      <input class="input" name="new_password" type="password" required minlength="6" maxlength="128"/>
      <div style="height:10px"></div>
      <label>Confirm New Password</label>
      <input class="input" name="confirm_password" type="password" required minlength="6" maxlength="128"/>
      <div style="height:14px"></div>
      <button class="btn full" type="button" id="resetBtn">Reset Password</button>
    </div>

    <p class="muted" style="margin-top:12px"><a href="login.html">Back to Login</a></p>
  </form>
</div>
<script src="js/api.js"></script>
<script>
let userEmail = '';
let username = '';
let securityAnswer = '';

document.getElementById("validateBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  msg.style.display = "none";
  const email = document.querySelector("input[name='email']").value.trim();
  const user = document.querySelector("input[name='username']").value.trim();
  
  if (!email || !user) {
    showMsg(msg, "Please fill in all fields");
    return;
  }
  
  try {
    const data = await api("/api/auth/forgot-password/validate", {
      method: "POST",
      body: { email, username },
      auth: false
    });
    userEmail = email;
    username = user;
    document.getElementById("securityQuestion").textContent = data.security_question;
    document.getElementById("step1").classList.add("hidden");
    document.getElementById("step2").classList.remove("hidden");
  } catch (err) {
    showMsg(msg, err.message);
  }
});

document.getElementById("verifyAnswerBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  msg.style.display = "none";
  const securityAnswer = document.querySelector("input[name='security_answer']").value.trim();
  
  if (!securityAnswer) {
    showMsg(msg, "Please provide your security answer");
    return;
  }
  
  try {
    await api("/api/auth/forgot-password/validate", {
      method: "POST",
      body: { email: userEmail, username, security_answer: securityAnswer },
      auth: false
    });
    securityAnswer = securityAnswer; // Store the verified answer
    document.getElementById("step2").classList.add("hidden");
    document.getElementById("step3").classList.remove("hidden");
  } catch (err) {
    showMsg(msg, err.message);
  }
});

document.getElementById("resetBtn").addEventListener("click", async () => {
  const msg = document.getElementById("msg");
  msg.style.display = "none";
  const newPassword = document.querySelector("input[name='new_password']").value;
  const confirmPassword = document.querySelector("input[name='confirm_password']").value;
  
  if (!newPassword || !confirmPassword) {
    showMsg(msg, "Please fill in all fields");
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showMsg(msg, "Passwords do not match");
    return;
  }
  
  if (newPassword.length < 6) {
    showMsg(msg, "Password must be at least 6 characters");
    return;
  }
  
  try {
    await api("/api/auth/forgot-password/reset", {
      method: "POST",
      body: { email: userEmail, username, security_answer: securityAnswer, new_password: newPassword },
      auth: false
    });
    msg.textContent = "Password reset successfully! Redirecting to login...";
    msg.className = "error success";
    msg.style.display = "block";
    setTimeout(() => {
      window.location.href = "login.html";
    }, 2000);
  } catch (err) {
    showMsg(msg, err.message);
  }
});

function showMsg(el, text) {
  el.textContent = text;
  el.className = "error";
  el.style.display = "block";
}
</script>
</body>
</html>
