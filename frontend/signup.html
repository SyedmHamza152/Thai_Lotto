<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign up — Lottery</title>
<link rel="stylesheet" href="css/styles.css"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap');

  :root {
    --bg: #0f0f14;
    --surface: #17171f;
    --surface2: #1e1e2a;
    --surface3: #242433;
    --border: #2a2a3a;
    --primary: #a855f7;
    --primary-glow: rgba(168,85,247,0.25);
    --accent: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #f1f0ff;
    --muted: #7b7a95;
    --muted2: #4a4a65;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg) !important;
    color: var(--text) !important;
    margin: 0;
    min-height: 100vh;
  }

  .center {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 400px;
  }

  .auth-card h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 8px;
  }

  .muted { color: var(--muted); }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }

  .input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    color: #fff;
    box-shadow: 0 4px 14px rgba(168,85,247,0.3);
    transition: all 0.18s;
  }

  .btn:hover { box-shadow: 0 6px 18px rgba(168,85,247,0.45); transform: translateY(-1px); }
  .btn.full { width: 100%; }

  .error {
    display: none;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13.5px;
    font-weight: 500;
    margin-bottom: 16px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
  }

  .error.success {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: #6ee7b7;
  }

  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="center">
  <form id="form" class="auth-card card">
    <h2>Create your account</h2>
    <div id="msg" class="error"></div>
    <label>Username (3–64 chars, letters/numbers/._-)</label>
    <input class="input" name="username" required minlength="3" maxlength="64" pattern="^[A-Za-z0-9_.\-]+$"/>
    <div style="height:10px"></div>
    <label>Email</label>
    <input class="input" name="email" type="email" required placeholder="your@email.com"/>
    <div style="height:10px"></div>
    <label>Phone number <span class="muted">(optional)</span></label>
    <input class="input" name="phone" type="tel" placeholder="e.g. 03001234567" maxlength="20"/>
    <p class="muted" style="margin-top:6px;font-size:0.85rem">You will receive a unique member ID (e.g. LOT000042) after signup.</p>
    <div style="height:10px"></div>
    <label>Security Question</label>
    <select class="input" name="security_question" required>
      <option value="">Select a question</option>
      <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
      <option value="What was the name of your first pet?">What was the name of your first pet?</option>
      <option value="What city were you born in?">What city were you born in?</option>
      <option value="What is your favorite color?">What is your favorite color?</option>
      <option value="What is the name of your elementary school?">What is the name of your elementary school?</option>
    </select>
    <div style="height:10px"></div>
    <label>Security Answer</label>
    <input class="input" name="security_answer" required placeholder="Your answer"/>
    <div style="height:10px"></div>
    <label>Password (min 6)</label>
    <input class="input" name="password" type="password" required minlength="6" maxlength="128"/>
    <div style="height:14px"></div>
    <button class="btn full" type="submit">Sign up</button>
    <p class="muted" style="margin-top:12px">Have an account? <a href="login.html">Login</a></p>
  </form>
</div>
<script src="js/api.js"></script>
<script>
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const msg = document.getElementById("msg");
  msg.style.display = "none";
  try {
    const phone = (fd.get("phone") || "").toString().trim();
    const body = {
      username: fd.get("username"),
      email: fd.get("email"),
      security_question: fd.get("security_question"),
      security_answer: fd.get("security_answer"),
      password: fd.get("password")
    };
    if (phone) body.phone = phone;
    const data = await api("/api/auth/signup", { method: "POST", body, auth: false });
    auth.set(data.access_token, {
      user_id: data.user_id,
      public_id: data.public_id,
      username: data.username,
      phone: data.phone,
      is_admin: data.is_admin,
    });
    window.location.href = "dashboard.html";
  } catch (err) { showMsg(msg, err.message); }
});
</script>
</body>
</html>
